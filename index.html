<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RDK RISE PROGRAMME | Elevator Pitch</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="header-content">

<h1>🎤 RDK RISE PROGRAMME</h1>

<p>Elevator Pitch Gallery</p>

</div>

</header>

<section class="topBar">

<input
type="text"
id="searchBox"
placeholder="🔍 Search Student...">

<button id="darkBtn">

🌙 Dark Mode

</button>

</section>

<div class="counter">

Total Videos :
<span id="totalVideos">45</span>

</div>

<main>

<div id="gallery" class="gallery">

<!-- Student cards will be created automatically -->

</div>

<div id="playerSection" class="playerSection hidden">

<button id="closePlayer" class="closeBtn">

✖ Close

</button>

<h2 id="studentName"></h2>

<div class="videoWrapper">

<video
id="videoPlayer"
controls
controlsList="nodownload"
preload="metadata">

</video>

</div>

<div class="controls">

<button id="prevBtn">

⏮ Previous

</button>

<button id="nextBtn">

Next ⏭

</button>

<button id="fullscreenBtn">

⛶ Full Screen

</button>

</div>

</div>

</main>

<footer>

<p>

© 2026 RDK RISE PROGRAMME | Elevator Pitch Gallery

</p>

<p class="credit">

Made with ❤️ by <strong>Vaibhav Sharma</strong>

</p>

</footer>

<script src="script.js"></script>

</body>

</html>
